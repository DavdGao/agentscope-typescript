# .github/ISSUE_TEMPLATE/feature_request.yml
name: Feature Request
description: Suggest an idea for this project
title: 'feat: '
labels: ['feat']
body:
    - type: markdown
      attributes:
          value: |
              > **This is an open-source project. To involve a broader community, we recommend describing your feature request in English.**

    - type: textarea
      id: problem
      attributes:
          label: Is your feature request related to a problem?
          description: A clear and concise description of what the problem is.
          placeholder: "e.g. I'm always frustrated when [...]"
      validations:
          required: false

    - type: textarea
      id: solution
      attributes:
          label: Describe the Solution You'd Like
          description: A clear and concise description of what you want to happen.
          placeholder: What would you like to see implemented?
      validations:
          required: true

    - type: textarea
      id: alternatives
      attributes:
          label: Describe Alternatives You've Considered
          description: A clear and concise description of any alternative solutions or features you've considered.
          placeholder: Any workarounds or alternatives you've tried?
      validations:
          required: false

    - type: textarea
      id: additional
      attributes:
          label: Additional Context
          description: Add any other context, screenshots, or references about the feature request here.
          placeholder: Any other context...
      validations:
          required: false

    - type: checkboxes
      id: confirm
      attributes:
          label: Checklist
          options:
              - label: I have searched existing issues and confirmed this is not a duplicate
                required: true
